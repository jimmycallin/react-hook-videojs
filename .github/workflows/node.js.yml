# This workflow installs dependencies, restores pnpm cache, builds source code, and runs tests using the Node version from .nvmrc
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm -r --if-present run build
      - run: pnpm test

  compatibility-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        videojs: ["7", "8"]

    name: React 19 / Video.js ${{ matrix.videojs }}

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --prefer-offline --no-frozen-lockfile
      - name: Pin React 19
        run: pnpm -w add -D --ignore-scripts react@19 react-dom@19 && pnpm --filter react-hook-videojs add -D --ignore-scripts react@19 react-dom@19
      - name: Pin package compatibility versions
        run: pnpm --filter react-hook-videojs add -D --ignore-scripts video.js@${{ matrix.videojs }}
      - run: pnpm exec playwright install chromium
      - run: pnpm run test:unit
