name: Publish

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 4.0.0-beta.1 or v4.0.0-beta.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve package name
        id: package-name
        run: |
          PACKAGE_NAME=$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('./packages/react-hook-videojs/package.json', 'utf8')); console.log(pkg.name);")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Resolve version from trigger
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name || '' }}
          REF_NAME: ${{ github.ref_name || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            RAW_VERSION="$RELEASE_TAG_NAME"
          elif [ "$EVENT_NAME" = "push" ]; then
            RAW_VERSION="$REF_NAME"
          else
            RAW_VERSION="$INPUT_VERSION"
          fi

          if [ -z "$RAW_VERSION" ]; then
            echo "Unable to resolve version from event. Provide workflow_dispatch input 'version'."
            exit 1
          fi

          PACKAGE_VERSION="${RAW_VERSION#v}"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version for CI publish
        run: |
          pnpm --filter react-hook-videojs exec npm pkg set version='${{ steps.version.outputs.version }}'

      - name: Resolve npm dist-tag from package version
        id: dist-tag
        run: |
          PACKAGE_VERSION="${{ steps.version.outputs.version }}"
          if echo "$PACKAGE_VERSION" | grep -q "-"; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already exists on npm
        id: npm-version
        run: |
          PACKAGE_REF="${{ steps.package-name.outputs.name }}@${{ steps.version.outputs.version }}"
          if npm view "$PACKAGE_REF" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm: $PACKAGE_REF"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to move npm "next" tag to this stable release
        id: next-tag
        if: steps.dist-tag.outputs.tag == 'latest' && steps.npm-version.outputs.should_publish == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package-name.outputs.name }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_NEXT_VERSION=$(npm view "${PACKAGE_NAME}@next" version 2>/dev/null || true)
          echo "current_next=$CURRENT_NEXT_VERSION" >> "$GITHUB_OUTPUT"

          SHOULD_SET_NEXT=$(node --input-type=module - "$PACKAGE_VERSION" "$CURRENT_NEXT_VERSION" <<'NODE'
          const [publishedVersion, currentNextVersion] = process.argv.slice(2);

          const parseSemver = (version) => {
            const match = version.match(
              /^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?(?:\+.*)?$/,
            );
            if (!match) {
              throw new Error(`Invalid semver version: ${version}`);
            }
            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              prerelease: match[4] ? match[4].split(".") : [],
            };
          };

          const compareIdentifiers = (a, b) => {
            const aIsNum = /^\d+$/.test(a);
            const bIsNum = /^\d+$/.test(b);

            if (aIsNum && bIsNum) return Number(a) - Number(b);
            if (aIsNum && !bIsNum) return -1;
            if (!aIsNum && bIsNum) return 1;
            return a.localeCompare(b);
          };

          const compareSemver = (left, right) => {
            if (left.major !== right.major) return left.major - right.major;
            if (left.minor !== right.minor) return left.minor - right.minor;
            if (left.patch !== right.patch) return left.patch - right.patch;

            const leftPre = left.prerelease;
            const rightPre = right.prerelease;

            if (leftPre.length === 0 && rightPre.length === 0) return 0;
            if (leftPre.length === 0) return 1;
            if (rightPre.length === 0) return -1;

            const maxLength = Math.max(leftPre.length, rightPre.length);
            for (let i = 0; i < maxLength; i += 1) {
              const leftId = leftPre[i];
              const rightId = rightPre[i];
              if (leftId === undefined) return -1;
              if (rightId === undefined) return 1;

              const cmp = compareIdentifiers(leftId, rightId);
              if (cmp !== 0) return cmp;
            }

            return 0;
          };

          if (!currentNextVersion) {
            console.log("true");
            process.exit(0);
          }

          try {
            const published = parseSemver(publishedVersion);
            const currentNext = parseSemver(currentNextVersion);

            // Keep "next" if it already points to a future version train.
            const isCurrentNextFuture = compareSemver(currentNext, published) > 0;
            console.log(isCurrentNextFuture ? "false" : "true");
          } catch (error) {
            console.error(String(error));
            // Conservative fallback: keep existing "next" when versions are unparseable.
            console.log("false");
          }
          NODE
          )

          echo "should_set_next=$SHOULD_SET_NEXT" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_SET_NEXT" = "true" ]; then
            echo "Will move npm 'next' to ${PACKAGE_VERSION} after publish."
          else
            echo "Keeping npm 'next' at ${CURRENT_NEXT_VERSION}; it is ahead of ${PACKAGE_VERSION}."
          fi

      - name: Publish package with npm provenance (OIDC)
        if: steps.npm-version.outputs.should_publish == 'true'
        run: pnpm --filter react-hook-videojs publish --access public --provenance --no-git-checks --tag ${{ steps.dist-tag.outputs.tag }}

      - name: Exchange GitHub OIDC token for npm registry token (dist-tag)
        id: npm-oidc-token
        if: steps.npm-version.outputs.should_publish == 'true' && steps.dist-tag.outputs.tag == 'latest' && steps.next-tag.outputs.should_set_next == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package-name.outputs.name }}
        run: |
          PACKAGE_NAME_ENCODED=$(node -p "encodeURIComponent(process.argv[1])" "$PACKAGE_NAME")

          OIDC_RESPONSE=$(curl -sSfL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
          OIDC_ID_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')

          if [ -z "$OIDC_ID_TOKEN" ] || [ "$OIDC_ID_TOKEN" = "null" ]; then
            echo "Failed to acquire GitHub OIDC id_token."
            exit 1
          fi

          EXCHANGE_RESPONSE=$(curl -sSfL -X POST \
            -H "Authorization: Bearer $OIDC_ID_TOKEN" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${PACKAGE_NAME_ENCODED}")
          NPM_OIDC_TOKEN=$(echo "$EXCHANGE_RESPONSE" | jq -r '.token')

          if [ -z "$NPM_OIDC_TOKEN" ] || [ "$NPM_OIDC_TOKEN" = "null" ]; then
            echo "Failed to exchange OIDC id_token for npm registry token."
            exit 1
          fi

          echo "::add-mask::$NPM_OIDC_TOKEN"
          echo "token=$NPM_OIDC_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Move npm "next" tag to this stable release
        if: steps.npm-version.outputs.should_publish == 'true' && steps.dist-tag.outputs.tag == 'latest' && steps.next-tag.outputs.should_set_next == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-oidc-token.outputs.token }}
        run: npm dist-tag add "${{ steps.package-name.outputs.name }}@${{ steps.version.outputs.version }}" next
